<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Felix e Castro Advocacia Especializada</title>
    <meta name="theme-color" content="#6B1A1F">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="/icon-192.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link id="manifest-placeholder" rel="manifest" href="">
    
    <script>
        // Dynamic Manifest Generation for PWA Installation
        window.addEventListener('DOMContentLoaded', () => {
            const manifest = {
                "name": "Felix e Castro Advocacia Especializada",
                "short_name": "Felix e Castro",
                "start_url": window.location.origin + "/",
                "display": "standalone",
                "background_color": "#6B1A1F",
                "theme_color": "#6B1A1F",
                "icons": [
                    {
                        "src": window.location.origin + "/icon-192.png",
                        "sizes": "192x192",
                        "type": "image/png"
                    },
                    {
                        "src": window.location.origin + "/icon-512.png",
                        "sizes": "512x512",
                        "type": "image/png"
                    }
                ]
            };
            const stringManifest = JSON.stringify(manifest);
            const blob = new Blob([stringManifest], {type: 'application/json'});
            const manifestURL = URL.createObjectURL(blob);
            document.querySelector('#manifest-placeholder').setAttribute('href', manifestURL);
        });
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-display, .font-serif {
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: -0.01em;
        }
        /* Custom Scrollbar - Felix & Castro */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d9c4a0;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #5a3a1f;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #C9A961;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
        }
        /* Tiptap Editor Styles */
        .ProseMirror {
            outline: none !important;
            min-height: 29.7cm; /* A4 height approx */
            padding: 2.5cm !important;
        }
        .ProseMirror p {
            margin-bottom: 1em;
        }
        .ProseMirror blockquote {
            border-left: 3px solid #000000;
            padding-left: 1cm;
            margin-left: 0;
            margin-right: 0;
            font-size: 1em;
            line-height: 1.5;
            color: #000000;
        }
        .pdf-export blockquote, .pdf-export blockquote * {
            color: #000000 !important;
            border-left-color: #000000 !important;
        }
        .ProseMirror table {
            border-collapse: collapse;
            table-layout: fixed;
            width: 100%;
            margin: 0;
            overflow: hidden;
        }
        .ProseMirror table td, .ProseMirror table th {
            min-width: 1em;
            border: 1px solid #cbd5e1;
            padding: 3px 5px;
            vertical-align: top;
            box-sizing: border-box;
            position: relative;
            background-color: #ffffff;
        }
        .dark .ProseMirror table td, .dark .ProseMirror table th {
            border-color: #334155;
            background-color: #1e293b;
            color: #f1f5f9;
        }
        .ProseMirror table th {
            font-weight: bold;
            text-align: left;
            background-color: #f1f5f9;
            color: #0f172a;
        }
        .dark .ProseMirror table th {
            background-color: #334155;
            color: #f1f5f9;
        }

        /* Print Styles */
        @media print {
            body {
                background-color: white !important;
                color: black !important;
            }
            .no-print {
                display: none !important;
            }
            .ProseMirror {
                background-color: white !important;
                color: black !important;
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                min-height: auto !important;
            }
            .dark .ProseMirror {
                background-color: white !important;
                color: black !important;
            }
            .dark body {
                background-color: white !important;
                color: black !important;
            }
        }
        .pdf-export {
            font-family: 'Inter', sans-serif;
            font-size: 12pt;
            line-height: 1.5;
            color: black;
            padding: 0;
            width: 190mm;
            box-sizing: border-box;
            background-color: white !important;
            border: none !important;
        }
        .pdf-export p {
            margin-bottom: 1em;
            text-align: justify;
            color: black !important;
        }
        .pdf-export blockquote {
            border-left: 3px solid black !important;
            margin-left: 1cm !important;
            padding-left: 0.5cm !important;
            color: black !important;
            display: block !important;
        }
        .pdf-export blockquote * {
            color: black !important;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@heroicons/react/": "https://esm.sh/@heroicons/react@^2.2.0/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/",
    "react/": "https://esm.sh/react@^19.2.1/",
    "react": "https://esm.sh/react@^19.2.1",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.97.0"
  }
}
</script>
</head>
<body class="bg-cream-50 dark:bg-[#0f0a0a] text-slate-900 dark:text-slate-100 transition-colors duration-200 antialiased selection:bg-primary-900 selection:text-cream-50">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
